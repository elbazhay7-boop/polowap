<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="פולואפ" />
    <title>פולואפ — CRM מתווכים</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f3;
        -webkit-font-smoothing: antialiased;
      }
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', monospace;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-background-tertiary: #eeece8;
        --color-text-primary: #1a1917;
        --color-text-secondary: #6b6966;
        --color-text-tertiary: #9b9895;
        --color-border-primary: #d4d2cc;
        --color-border-secondary: #e0deda;
        --color-border-tertiary: #eae8e4;
        --border-radius-sm: 4px;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      #root { height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
